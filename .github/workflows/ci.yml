name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .[dev]

      - name: Verify CLI version
        run: quant-research --version

      - name: Run tests
        run: pytest -q

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .[dev]

      - name: Build distribution artifacts
        run: python -m build --sdist --wheel

      - name: Verify distribution contents
        run: pytest -q tests/test_distribution_artifacts.py

      - name: Doctor sample config
        run: quant-research doctor --config config/sample_config.json --output-dir test_output/ci-doctor --strict --json

      - name: Validate sample config
        run: quant-research validate --config config/sample_config.json --output-dir test_output/ci-validate

      - name: Build sample outputs
        run: |
          quant-research backtest --config config/sample_config.json --output-dir test_output/ci-output
          quant-research report --config config/sample_config.json --output-dir test_output/ci-output
          quant-research publish-demo --config config/sample_config.json --output-dir test_output/ci-output --demo-site-dir test_output/ci-demo

      - name: Assert smoke artifacts exist
        run: |
          test -f test_output/ci-doctor/doctor_report.json
          test -f test_output/ci-doctor/doctor_report.csv
          test -f test_output/ci-doctor/doctor_report.html
          test -f test_output/ci-validate/validation_summary.json
          test -f test_output/ci-output/report_summary.json
          test -f test_output/ci-demo/index.html
