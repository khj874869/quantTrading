name: Deploy Sample Demo

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-demo:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch || github.ref_name == 'main'
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.configure-pages.outcome == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Build sample research outputs
        run: |
          quant-research backtest --config config/sample_config.json --output-dir output/pages-output
          quant-research report --config config/sample_config.json --output-dir output/pages-output
          quant-research reconcile --config config/sample_config.json --output-dir output/pages-output
          quant-research publish-demo --config config/sample_config.json --output-dir output/pages-output --demo-site-dir docs/demo
          quant-research gallery --config config/sample_config.json --output-dir output/pages-output --demo-site-dir docs/demo

      - name: Configure Pages
        id: configure-pages
        continue-on-error: true
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/demo
          include-hidden-files: true

      - name: Note Pages setup is required
        if: steps.configure-pages.outcome != 'success'
        run: |
          echo "GitHub Pages is not enabled, or this repository token cannot enable it automatically." >> "$GITHUB_STEP_SUMMARY"
          echo "Enable Pages in repository settings with GitHub Actions as the source, then rerun this workflow to deploy." >> "$GITHUB_STEP_SUMMARY"

  deploy-demo:
    if: (github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch || github.ref_name == 'main') && needs.build-demo.outputs.pages_ready == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-demo
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
